<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#060616"/>
      <stop offset="100%" stop-color="#02020a"/>
    </radialGradient>
    <radialGradient id="glow-purple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8800ff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#8800ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-cyan" cx="20%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#00aaff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#00aaff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-pink" cx="80%" cy="70%" r="35%">
      <stop offset="0%" stop-color="#ff0080" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#ff0080" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rainbow-h" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#ff0080" stop-opacity="0.15"/>
      <stop offset="17%"  stop-color="#ff4400" stop-opacity="0.15"/>
      <stop offset="33%"  stop-color="#ffaa00" stop-opacity="0.15"/>
      <stop offset="50%"  stop-color="#00ff88" stop-opacity="0.15"/>
      <stop offset="67%"  stop-color="#00aaff" stop-opacity="0.15"/>
      <stop offset="83%"  stop-color="#8800ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ff0080" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="glow-filter">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bg)"/>

  <!-- Ambient glows -->
  <ellipse cx="960" cy="540" rx="900" ry="500" fill="url(#glow-purple)"/>
  <ellipse cx="300" cy="300" rx="600" ry="400" fill="url(#glow-cyan)"/>
  <ellipse cx="1600" cy="800" rx="500" ry="350" fill="url(#glow-pink)"/>

  <!-- Grid lines horizontal - very subtle -->
  <g stroke="rgba(255,255,255,0.025)" stroke-width="1">
    <line x1="0" y1="108" x2="1920" y2="108"/>
    <line x1="0" y1="216" x2="1920" y2="216"/>
    <line x1="0" y1="324" x2="1920" y2="324"/>
    <line x1="0" y1="432" x2="1920" y2="432"/>
    <line x1="0" y1="540" x2="1920" y2="540"/>
    <line x1="0" y1="648" x2="1920" y2="648"/>
    <line x1="0" y1="756" x2="1920" y2="756"/>
    <line x1="0" y1="864" x2="1920" y2="864"/>
    <line x1="0" y1="972" x2="1920" y2="972"/>
  </g>

  <!-- Grid lines vertical -->
  <g stroke="rgba(255,255,255,0.025)" stroke-width="1">
    <line x1="192" y1="0" x2="192" y2="1080"/>
    <line x1="384" y1="0" x2="384" y2="1080"/>
    <line x1="576" y1="0" x2="576" y2="1080"/>
    <line x1="768" y1="0" x2="768" y2="1080"/>
    <line x1="960" y1="0" x2="960" y2="1080"/>
    <line x1="1152" y1="0" x2="1152" y2="1080"/>
    <line x1="1344" y1="0" x2="1344" y2="1080"/>
    <line x1="1536" y1="0" x2="1536" y2="1080"/>
    <line x1="1728" y1="0" x2="1728" y2="1080"/>
  </g>

  <!-- Center hexagon logo -->
  <g transform="translate(960,520)" opacity="0.07" filter="url(#glow-filter)">
    <!-- Outer hex -->
    <polygon points="0,-100 87,-50 87,50 0,100 -87,50 -87,-50"
             fill="none" stroke="url(#rainbow-h)" stroke-width="1.5"/>
    <!-- Inner hex -->
    <polygon points="0,-70 61,-35 61,35 0,70 -61,35 -61,-35"
             fill="none" stroke="#a855f7" stroke-width="1"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="4" fill="#a855f7" opacity="0.8"/>
    <!-- Lines from center to vertices -->
    <g stroke="#a855f7" stroke-width="0.5" opacity="0.4">
      <line x1="0" y1="0" x2="0" y2="-70"/>
      <line x1="0" y1="0" x2="61" y2="-35"/>
      <line x1="0" y1="0" x2="61" y2="35"/>
      <line x1="0" y1="0" x2="0" y2="70"/>
      <line x1="0" y1="0" x2="-61" y2="35"/>
      <line x1="0" y1="0" x2="-61" y2="-35"/>
    </g>
    <!-- Text -->
    <text x="0" y="6" text-anchor="middle" fill="#c084fc"
          font-family="monospace" font-size="20" font-weight="bold"
          letter-spacing="10">AETHER</text>
    <text x="0" y="24" text-anchor="middle" fill="#a855f7"
          font-family="monospace" font-size="8" letter-spacing="4">AGI FOUNDATION OS</text>
  </g>

  <!-- Rainbow top border accent -->
  <rect x="0" y="0" width="1920" height="2" fill="url(#rainbow-h)" opacity="0.4"/>

  <!-- Rainbow bottom border accent -->
  <rect x="0" y="1078" width="1920" height="2" fill="url(#rainbow-h)" opacity="0.4"/>

  <!-- Corner decorations -->
  <g opacity="0.1">
    <!-- TL -->
    <polyline points="0,80 0,0 80,0" fill="none" stroke="#ff0080" stroke-width="1.5"/>
    <polyline points="0,50 0,20 20,20 20,0" fill="none" stroke="#ff0080" stroke-width="1"/>
    <!-- TR -->
    <polyline points="1920,80 1920,0 1840,0" fill="none" stroke="#00aaff" stroke-width="1.5"/>
    <polyline points="1920,50 1920,20 1900,20 1900,0" fill="none" stroke="#00aaff" stroke-width="1"/>
    <!-- BL -->
    <polyline points="0,1000 0,1080 80,1080" fill="none" stroke="#00ff88" stroke-width="1.5"/>
    <polyline points="0,1060 0,1080 20,1080 20,1060" fill="none" stroke="#00ff88" stroke-width="1"/>
    <!-- BR -->
    <polyline points="1920,1000 1920,1080 1840,1080" fill="none" stroke="#a855f7" stroke-width="1.5"/>
    <polyline points="1920,1060 1920,1080 1900,1080 1900,1060" fill="none" stroke="#a855f7" stroke-width="1"/>
  </g>

  <!-- Floating particles -->
  <g opacity="0.15">
    <circle cx="200"  cy="200"  r="1.5" fill="#ff0080"/>
    <circle cx="450"  cy="120"  r="1"   fill="#ff4400"/>
    <circle cx="700"  cy="300"  r="1.5" fill="#ffaa00"/>
    <circle cx="1100" cy="180"  r="1"   fill="#00ff88"/>
    <circle cx="1400" cy="250"  r="1.5" fill="#00aaff"/>
    <circle cx="1700" cy="150"  r="1"   fill="#8800ff"/>
    <circle cx="350"  cy="800"  r="1.5" fill="#ff0080"/>
    <circle cx="800"  cy="900"  r="1"   fill="#00aaff"/>
    <circle cx="1200" cy="850"  r="1.5" fill="#a855f7"/>
    <circle cx="1600" cy="950"  r="1"   fill="#00ff88"/>
    <circle cx="100"  cy="600"  r="1"   fill="#ffaa00"/>
    <circle cx="1850" cy="500"  r="1.5" fill="#ff0080"/>
  </g>
</svg>
