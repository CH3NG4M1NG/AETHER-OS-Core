<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0a0a18"/>
      <stop offset="100%" stop-color="#03030a"/>
    </radialGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00b4d4" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#00b4d4" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bg)"/>

  <!-- Grid lines horizontal -->
  <g stroke="rgba(0,180,212,0.04)" stroke-width="1">
    <line x1="0" y1="90" x2="1920" y2="90"/>
    <line x1="0" y1="180" x2="1920" y2="180"/>
    <line x1="0" y1="270" x2="1920" y2="270"/>
    <line x1="0" y1="360" x2="1920" y2="360"/>
    <line x1="0" y1="450" x2="1920" y2="450"/>
    <line x1="0" y1="540" x2="1920" y2="540"/>
    <line x1="0" y1="630" x2="1920" y2="630"/>
    <line x1="0" y1="720" x2="1920" y2="720"/>
    <line x1="0" y1="810" x2="1920" y2="810"/>
    <line x1="0" y1="900" x2="1920" y2="900"/>
    <line x1="0" y1="990" x2="1920" y2="990"/>
  </g>

  <!-- Grid lines vertical -->
  <g stroke="rgba(0,180,212,0.04)" stroke-width="1">
    <line x1="120" y1="0" x2="120" y2="1080"/>
    <line x1="240" y1="0" x2="240" y2="1080"/>
    <line x1="360" y1="0" x2="360" y2="1080"/>
    <line x1="480" y1="0" x2="480" y2="1080"/>
    <line x1="600" y1="0" x2="600" y2="1080"/>
    <line x1="720" y1="0" x2="720" y2="1080"/>
    <line x1="840" y1="0" x2="840" y2="1080"/>
    <line x1="960" y1="0" x2="960" y2="1080"/>
    <line x1="1080" y1="0" x2="1080" y2="1080"/>
    <line x1="1200" y1="0" x2="1200" y2="1080"/>
    <line x1="1320" y1="0" x2="1320" y2="1080"/>
    <line x1="1440" y1="0" x2="1440" y2="1080"/>
    <line x1="1560" y1="0" x2="1560" y2="1080"/>
    <line x1="1680" y1="0" x2="1680" y2="1080"/>
    <line x1="1800" y1="0" x2="1800" y2="1080"/>
  </g>

  <!-- Center glow -->
  <ellipse cx="960" cy="540" rx="800" ry="400" fill="url(#glow2)"/>
  <ellipse cx="960" cy="540" rx="400" ry="200" fill="url(#glow1)"/>

  <!-- Hexagon AETHER logo - center watermark -->
  <g transform="translate(960,540)" opacity="0.04">
    <polygon points="0,-80 69,-40 69,40 0,80 -69,40 -69,-40"
             fill="none" stroke="#00e5ff" stroke-width="2"/>
    <polygon points="0,-60 52,-30 52,30 0,60 -52,30 -52,-30"
             fill="none" stroke="#00e5ff" stroke-width="1"/>
    <text x="0" y="6" text-anchor="middle" fill="#00e5ff"
          font-family="monospace" font-size="18" font-weight="bold"
          letter-spacing="8">AETHER</text>
    <text x="0" y="22" text-anchor="middle" fill="#00e5ff"
          font-family="monospace" font-size="7" letter-spacing="3">AGI FOUNDATION</text>
  </g>

  <!-- Corner accents -->
  <g stroke="#00e5ff" stroke-width="1" opacity="0.08" fill="none">
    <!-- Top left -->
    <polyline points="0,60 0,0 60,0"/>
    <polyline points="0,40 0,20 20,20 20,0"/>
    <!-- Top right -->
    <polyline points="1920,60 1920,0 1860,0"/>
    <polyline points="1920,40 1920,20 1900,20 1900,0"/>
    <!-- Bottom left -->
    <polyline points="0,1020 0,1080 60,1080"/>
    <polyline points="0,1060 0,1080 20,1080 20,1060"/>
    <!-- Bottom right -->
    <polyline points="1920,1020 1920,1080 1860,1080"/>
    <polyline points="1920,1060 1920,1080 1900,1080 1900,1060"/>
  </g>

  <!-- Subtle scan lines -->
  <rect width="1920" height="1080"
        fill="url(#scanlines)" opacity="0.015"/>

  <!-- Bottom accent line -->
  <line x1="0" y1="1079" x2="1920" y2="1079"
        stroke="#00e5ff" stroke-width="1" opacity="0.06"/>

  <!-- Top accent line -->
  <line x1="0" y1="1" x2="1920" y2="1"
        stroke="#00e5ff" stroke-width="1" opacity="0.06"/>

  <!-- Dots at grid intersections (subtle) -->
  <g fill="rgba(0,229,255,0.06)">
    <circle cx="960" cy="270" r="1.5"/>
    <circle cx="960" cy="810" r="1.5"/>
    <circle cx="480" cy="540" r="1.5"/>
    <circle cx="1440" cy="540" r="1.5"/>
    <circle cx="480" cy="270" r="1"/>
    <circle cx="1440" cy="270" r="1"/>
    <circle cx="480" cy="810" r="1"/>
    <circle cx="1440" cy="810" r="1"/>
  </g>
</svg>
